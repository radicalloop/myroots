services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: family_tree
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3001"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/family_tree?connection_limit=20&pool_timeout=10"
      JWT_SECRET: change-me-to-a-random-secret-at-least-64-chars
      JWT_REFRESH_SECRET: change-me-to-another-random-secret-at-least-64-chars
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost"
      BCRYPT_SALT_ROUNDS: "10"
      FRONT_URL: "http://localhost"
      # Optional: AWS S3 for image uploads (leave empty to use local temp/uploads)
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AWS_REGION: us-east-1
      AWS_BUCKET_NAME: ""
      AWS_SIGNED_URL_EXPIRES_IN_SECONDS: "3600"
      LOCAL_UPLOAD_DIR: temp/uploads
      # Optional: AI chat (leave empty to skip)
      AI_MODAL: ""
      AI_API_KEY: ""
      AI_BASE_URL: ""

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
